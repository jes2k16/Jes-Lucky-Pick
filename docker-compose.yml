services:
  postgres:
    image: postgres:17
    container_name: Jes-Lucky-Pick
    environment:
      POSTGRES_DB: jesluckypick
      POSTGRES_USER: jesluckypick_admin
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jesluckypick_admin -d jesluckypick"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: Jes-Lucky-Pick-Redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata:
